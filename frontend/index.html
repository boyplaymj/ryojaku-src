<!DOCTYPE html>
<html lang="zh-TW" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050b14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="両雀" />
  <title>両雀</title>
  <link rel="icon" type="image/png" href="/icon.png?v=2" />
  <link rel="apple-touch-icon" href="/icon.png?v=2" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        screens: {
          'xs': '23.4375rem', // 375px
          'sm': '40rem',      // 640px
          'md': '52rem',      // 832px - Increased threshold for tablets to support larger phones
          'lg': '64rem',      // 1024px
          'xl': '80rem',      // 1280px
          '2xl': '96rem',     // 1536px
        },
        extend: {
          colors: {
            cyber: {
              dark: '#050b14',
              slate: '#0f172a',
              cyan: '#06b6d4',
              pink: '#d946ef',
              yellow: '#facc15',
              purple: '#8b5cf6',
            },
            glass: 'rgba(15, 23, 42, 0.6)',
          },
          fontFamily: {
            sans: ['Inter', 'Roboto', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          boxShadow: {
            'neon-cyan': '0 0 10px rgba(6, 182, 212, 0.5), 0 0 20px rgba(6, 182, 212, 0.3)',
            'neon-pink': '0 0 10px rgba(217, 70, 239, 0.5), 0 0 20px rgba(217, 70, 239, 0.3)',
            'neon-yellow': '0 0 10px rgba(250, 204, 21, 0.5), 0 0 20px rgba(250, 204, 21, 0.3)',
          },
          animation: {
            'grid-flow': 'gridFlow 20s linear infinite',
            'pulse-glow': 'pulseGlow 3s infinite',
            'scanline': 'scanline 8s linear infinite',
            'float': 'float 6s ease-in-out infinite',
            'spin-slow': 'spin 8s linear infinite',
          },
          keyframes: {
            gridFlow: {
              '0%': { transform: 'translateY(0)' },
              '100%': { transform: 'translateY(40px)' },
            },
            pulseGlow: {
              '0%, 100%': { opacity: 1, filter: 'brightness(1.2)' },
              '50%': { opacity: 0.8, filter: 'brightness(1)' },
            },
            scanline: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(200%)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          },
        },
      },
    }
  </script>
  <style>
    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body {
      background-color: #050b14;
      color: #e2e8f0;
      overscroll-behavior-y: none;
    }

    /* Cyberpunk Grid Background */
    .cyber-grid {
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
      mask-image: linear-gradient(to bottom, transparent 5%, black 40%, black 90%, transparent 100%);
    }

    /* Safe area */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .pt-safe {
      padding-top: env(safe-area-inset-top, 20px);
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-[#050b14] text-slate-100 antialiased overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
