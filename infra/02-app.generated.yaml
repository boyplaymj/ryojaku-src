      RouteSelectionExpression: '$request.body.action'
  WsIntegconnect:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnChatWsConnect.Arn}/invocations'
  WsRouteconnect:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: '$connect'
      Target: !Sub 'integrations/${WsIntegconnect}'
  WsPermconnect:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FnChatWsConnect
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
  WsIntegdisconnect:
