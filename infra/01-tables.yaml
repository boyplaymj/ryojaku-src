AWSTemplateFormatVersion: '2010-09-09'
Description: >
  両雀 Ryōjaku — 資料層 (DynamoDB 24 tables).
  接手自工程師既有服務，重建到我們 AWS 帳號 (staging 先空表)。
  Keys 取自工程師 setup_*.{sh,ps1} 建表腳本；GSI 名稱取自 Go 源碼實際 IndexName 引用。
  全表 PAY_PER_REQUEST（遵 tools/COST_CONTROL.md §1 鐵律）。

Parameters:
  TablePrefix:
    Type: String
    Default: MahjongClubStg_
    Description: staging 用獨立前綴，避免與 prod (MahjongClub_) 撞名；正式切換時改回 MahjongClub_
  LineBotTablePrefix:
    Type: String
    Default: LineBotStg-
    Description: LineBot-* 表(AI顧問/LINE用戶檔)前綴；staging=LineBotStg- 與 prod(LineBot-)分離，避免同帳號撞名；正式切換改回 LineBot-

Resources:

  # ---------- 核心 ----------
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: email, AttributeType: S }
        - { AttributeName: invitedBy, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema: [ { AttributeName: email, KeyType: HASH } ]
          Projection: { ProjectionType: ALL }
        - IndexName: invitedBy-index
          KeySchema: [ { AttributeName: invitedBy, KeyType: HASH } ]
          Projection: { ProjectionType: ALL }

  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Games'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: gameId, AttributeType: S }
        - { AttributeName: status, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: N }
      KeySchema:
        - { AttributeName: gameId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: status-createdAt-index
          KeySchema:
            - { AttributeName: status, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification: { AttributeName: expiresAt, Enabled: true }

  RegistrationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Registrations'
      BillingMode: PAY_PER_REQUEST
      # ⚠️ 修正(S2影子測試2026-07-17):PK改registrationId(單一)。原建(gameId,userId)
      # 與程式不符——accept/cancel/reject/register 全用 GetItem{registrationId} 單鍵查詢，
      # 複合鍵會讓 accept-registration 找不到報名。userId 僅在 Scan filter 用非 key。
      AttributeDefinitions:
        - { AttributeName: registrationId, AttributeType: S }
        - { AttributeName: gameId, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: N }
      KeySchema:
        - { AttributeName: registrationId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: gameId-createdAt-index   # register / game_detail 用
          KeySchema:
            - { AttributeName: gameId, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GameIdIndex              # cancel_game 用(源碼硬編此名)
          KeySchema:
            - { AttributeName: gameId, KeyType: HASH }
          Projection: { ProjectionType: ALL }

  # RatingComments 與 Ratings 分離（源碼各自 query）
  RatingCommentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}RatingComments'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: gameId, AttributeType: S }
        - { AttributeName: fromUserId, AttributeType: S }
        - { AttributeName: toUserId, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: N }
      KeySchema:
        - { AttributeName: gameId, KeyType: HASH }
        - { AttributeName: fromUserId, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: toUserId-createdAt-index
          KeySchema:
            - { AttributeName: toUserId, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: gameId-fromUserId-index
          KeySchema:
            - { AttributeName: gameId, KeyType: HASH }
            - { AttributeName: fromUserId, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  RatingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Ratings'
      BillingMode: PAY_PER_REQUEST
      # 修正(S2 2026-07-17):補toUserId-createdAt-index。get-ratings的getRatingsByToUser
      # 查此GSI(依受評者列出評分),原缺→ValidationException。createdAt=int64(N)。
      AttributeDefinitions:
        - { AttributeName: gameId, AttributeType: S }
        - { AttributeName: fromUserId, AttributeType: S }
        - { AttributeName: toUserId, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: N }
      KeySchema:
        - { AttributeName: gameId, KeyType: HASH }
        - { AttributeName: fromUserId, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: gameId-fromUserId-index
          KeySchema:
            - { AttributeName: gameId, KeyType: HASH }
            - { AttributeName: fromUserId, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: toUserId-createdAt-index
          KeySchema:
            - { AttributeName: toUserId, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # Community 單表設計 (Post/Comment/Like 用 SK 前綴)。createdAt 為 ISO8601 字串 (S)
  CommunityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Community'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: postId, AttributeType: S }
        - { AttributeName: sortKey, AttributeType: S }
        - { AttributeName: authorId, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: S }
      KeySchema:
        - { AttributeName: postId, KeyType: HASH }
        - { AttributeName: sortKey, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: authorId-createdAt-index
          KeySchema:
            - { AttributeName: authorId, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: sortKey-createdAt-index
          KeySchema:
            - { AttributeName: sortKey, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # ---------- 點數 / 記帳 ----------
  PointTransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}PointTransactions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: sortKey, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: sortKey, KeyType: RANGE }

  LedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Ledger'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: sortKey, AttributeType: S }
        - { AttributeName: gameId, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: N }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: sortKey, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: gameId-createdAt-index
          KeySchema:
            - { AttributeName: gameId, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # ---------- 通知 / 推播 ----------
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Notifications'
      BillingMode: PAY_PER_REQUEST
      # 修正(S2 2026-07-17):PK改notificationId。程式UpdateItem(標已讀)用notificationId
      # 單鍵、列表查userId-createdAt-index GSI；原(userId,createdAt)複合鍵不符。
      AttributeDefinitions:
        - { AttributeName: notificationId, AttributeType: S }
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: N }
      KeySchema:
        - { AttributeName: notificationId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: userId-createdAt-index
          KeySchema:
            - { AttributeName: userId, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification: { AttributeName: expiresAt, Enabled: true }

  PushSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}PushSubscriptions_MultiDevice'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: deviceId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: deviceId, KeyType: RANGE }

  # ---------- 聊天 (4 表, keys 取自 setup_chat_tables.ps1) ----------
  ChatRoomsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}ChatRooms'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: RoomID, AttributeType: S }
      KeySchema:
        - { AttributeName: RoomID, KeyType: HASH }

  ChatUserMembershipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}ChatUserMemberships'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: UserID, AttributeType: S }
        - { AttributeName: 'LastMessageTime#RoomID', AttributeType: S }
      KeySchema:
        - { AttributeName: UserID, KeyType: HASH }
        - { AttributeName: 'LastMessageTime#RoomID', KeyType: RANGE }

  ChatMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}ChatMessages'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: RoomID, AttributeType: S }
        - { AttributeName: 'Timestamp#MessageID', AttributeType: S }
      KeySchema:
        - { AttributeName: RoomID, KeyType: HASH }
        - { AttributeName: 'Timestamp#MessageID', KeyType: RANGE }
      TimeToLiveSpecification: { AttributeName: TTL, Enabled: true }

  ChatConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}ChatConnections'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: ConnectionID, AttributeType: S }
        - { AttributeName: UserID, AttributeType: S }
      KeySchema:
        - { AttributeName: ConnectionID, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: UserID-index
          KeySchema: [ { AttributeName: UserID, KeyType: HASH } ]
          Projection: { ProjectionType: ALL }

  # ---------- 後台 / 營運 (keys 取自 setup_admin_tables.sh) ----------
  AdminUsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AdminUsers'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: username, AttributeType: S } ]
      KeySchema: [ { AttributeName: username, KeyType: HASH } ]

  AdminAuditLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AdminAuditLogs'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: log_id, AttributeType: S } ]
      KeySchema: [ { AttributeName: log_id, KeyType: HASH } ]

  AdminConfigsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AdminConfigs'
      BillingMode: PAY_PER_REQUEST
      # 修正(S2稽核2026-07-17):PK改info_key。程式全用info_key(getRewardsConfig/
      # admin_versions/activities/邀請獎勵config),原configKey→所有config讀取失敗靜默用預設。
      AttributeDefinitions: [ { AttributeName: info_key, AttributeType: S } ]
      KeySchema: [ { AttributeName: info_key, KeyType: HASH } ]

  # 修正(S2稽核2026-07-17):表名改ActivityVouchers。admin_vouchers用
  # tablePrefix+"ActivityVouchers",原Vouchers→找不到表。PK=code不變。
  VouchersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}ActivityVouchers'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: code, AttributeType: S } ]
      KeySchema: [ { AttributeName: code, KeyType: HASH } ]

  # 修正(S2 2026-07-17):PK改codeId(第7個schema錯配)。redeem-code與redeem-points
  # 兩路徑都以GetItem{codeId}存取,原PK=code不符。GSI:BatchIdIndex(依批次)+
  # commandId-redeemedTS-index(源碼引用,保留)。
  RedeemCodesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}RedeemCodes'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: codeId, AttributeType: S }
        - { AttributeName: commandId, AttributeType: S }
        - { AttributeName: redeemedTS, AttributeType: N }
        - { AttributeName: batchId, AttributeType: S }
      KeySchema: [ { AttributeName: codeId, KeyType: HASH } ]
      GlobalSecondaryIndexes:
        - IndexName: commandId-redeemedTS-index
          KeySchema:
            - { AttributeName: commandId, KeyType: HASH }
            - { AttributeName: redeemedTS, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: BatchIdIndex
          KeySchema: [ { AttributeName: batchId, KeyType: HASH } ]
          Projection: { ProjectionType: ALL }

  # S2補:CodeBatches原完全缺IaC(mahjongclub-redeem的saveBatch/getBatches用)。PK=batchId
  CodeBatchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}CodeBatches'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: batchId, AttributeType: S } ]
      KeySchema: [ { AttributeName: batchId, KeyType: HASH } ]

  EventCommandsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}EventCommands'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: commandId, AttributeType: S }
        - { AttributeName: command, AttributeType: S }
      KeySchema: [ { AttributeName: commandId, KeyType: HASH } ]
      GlobalSecondaryIndexes:
        - IndexName: command-index
          KeySchema: [ { AttributeName: command, KeyType: HASH } ]
          Projection: { ProjectionType: ALL }

  EventRedemptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}EventRedemptions'
      BillingMode: PAY_PER_REQUEST
      # 修正(S2 2026-07-17):PK改redemptionId(Put條件attribute_not_exists(redemptionId))
      # + 補commandId-redeemedTS-index GSI(getEventRedemptionsByCommand用);原(userId,createdAt)不符。
      AttributeDefinitions:
        - { AttributeName: redemptionId, AttributeType: S }
        - { AttributeName: commandId, AttributeType: S }
        - { AttributeName: redeemedTS, AttributeType: N }
      KeySchema:
        - { AttributeName: redemptionId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: commandId-redeemedTS-index
          KeySchema:
            - { AttributeName: commandId, KeyType: HASH }
            - { AttributeName: redeemedTS, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  DailyClaimsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}DailyClaims'
      BillingMode: PAY_PER_REQUEST
      # 修正(S2 2026-07-17):key名casing錯。程式存取用userID/claimDate(dynamodbav標)+
      # admin_analysis查claimDate-userID-index GSI;原(userId,date)大小寫與名稱皆不符。
      AttributeDefinitions:
        - { AttributeName: userID, AttributeType: S }
        - { AttributeName: claimDate, AttributeType: S }
      KeySchema:
        - { AttributeName: userID, KeyType: HASH }
        - { AttributeName: claimDate, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: claimDate-userID-index
          KeySchema:
            - { AttributeName: claimDate, KeyType: HASH }
            - { AttributeName: userID, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  APITokenStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}APITokenStats'
      BillingMode: PAY_PER_REQUEST
      # 修正(S2 2026-07-17):PK改(date,endpoint)。token_stats.go以此為key做原子計數,
      # admin_analysis依date查;原tokenId不符。
      AttributeDefinitions:
        - { AttributeName: date, AttributeType: S }
        - { AttributeName: endpoint, AttributeType: S }
      KeySchema:
        - { AttributeName: date, KeyType: HASH }
        - { AttributeName: endpoint, KeyType: RANGE }

  # 遙測:RecordTraffic 以 (Date, Category=category#action) 原子計數
  TrafficStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}TrafficStats'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: Date, AttributeType: S }
        - { AttributeName: Category, AttributeType: S }
      KeySchema:
        - { AttributeName: Date, KeyType: HASH }
        - { AttributeName: Category, KeyType: RANGE }

  # ---------- LINE / AI 顧問 (獨立命名，不帶 MahjongClub_ 前綴) ----------
  LineBotUserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${LineBotTablePrefix}User-Profiles'   # S2修:改 env-driven 前綴,不再硬編
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: user_id, AttributeType: S } ]
      KeySchema: [ { AttributeName: user_id, KeyType: HASH } ]

  LineBotUserProfileSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${LineBotTablePrefix}User-Profile-Sessions'   # S2修:改 env-driven 前綴,不再硬編
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: user_id, AttributeType: S } ]
      KeySchema: [ { AttributeName: user_id, KeyType: HASH } ]
      TimeToLiveSpecification: { AttributeName: expires_at, Enabled: true }

  # ---------- S3 媒體桶(S2補:程式讀 ASSETS_BUCKET/COMMUNITY_BUCKET env,原缺 IaC) ----------
  # staging 名;正式版另建 mahjongclub-app-assets / mahjongclub-community-media。
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ryojaku-stg-assets     # 頭像等,get-upload-url presign 目標
      CorsConfiguration:
        CorsRules:
          - { AllowedMethods: [GET, PUT, POST], AllowedOrigins: ['*'], AllowedHeaders: ['*'], MaxAge: 3000 }
  CommunityBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ryojaku-stg-community   # 社群/聊天/活動媒體,*-get-upload-url presign 目標
      CorsConfiguration:
        CorsRules:
          - { AllowedMethods: [GET, PUT, POST], AllowedOrigins: ['*'], AllowedHeaders: ['*'], MaxAge: 3000 }

  # ---------- 帳號系統 (AUTH_SYSTEM_DESIGN P0.3) ----------
  # 一帳號多鑰匙:登入身分索引 + 一次性 token(認證信/重設密碼)。詳 tools/ryojaku-webapp/AUTH_SYSTEM_DESIGN.md
  AuthIdentitiesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AuthIdentities'   # PK=identity: google#<sub> / email#<lower> / line#<encId> → userId
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: identity, AttributeType: S }
        - { AttributeName: userId, AttributeType: S }
      KeySchema:
        - { AttributeName: identity, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: userId-index                        # 查某帳號綁了哪些鑰匙(解綁最後一把守衛/後台)
          KeySchema: [ { AttributeName: userId, KeyType: HASH } ]
          Projection: { ProjectionType: ALL }
  AuthTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AuthTokens'        # PK=tokenHash(SHA256,不存明碼);purpose=verify_email|reset_password
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: tokenHash, AttributeType: S } ]
      KeySchema: [ { AttributeName: tokenHash, KeyType: HASH } ]
      TimeToLiveSpecification: { AttributeName: expiresAt, Enabled: true }   # verify 24h / reset 30min 自動清
  AuthRateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AuthRateLimit'     # PK=rlKey(行為#識別#窗口桶);固定窗口計數,防暴力/寄信轟炸
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [ { AttributeName: rlKey, AttributeType: S } ]
      KeySchema: [ { AttributeName: rlKey, KeyType: HASH } ]
      TimeToLiveSpecification: { AttributeName: expiresAt, Enabled: true }   # 窗口過後自清

Outputs:
  TablePrefix:
    Value: !Ref TablePrefix
    Export: { Name: RyojakuTablePrefix }
